<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>

    <style>
        @charset "UTF-8";

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #ffffff;
            color: #3a3a3a;
            font-family: Arial, Helvetica, sans-serif;
        }

        .not-found-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            text-align: center;
            padding-top: 14vh;
        }

        .not-found-content {
            width: 90%;
            max-width: 620px;
        }

        .error-code {
            margin: 0;
            font-size: clamp(7rem, 20vw, 13rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -8px;
            color: #3f3f3f;
        }

        .error-title {
            margin: 2rem 0 1.4rem;
            font-size: clamp(1.5rem, 4vw, 2.3rem);
            font-weight: 700;
            color: #444;
        }

        .error-message {
            margin: 0;
            font-size: clamp(0.9rem, 2vw, 1.05rem);
            font-weight: 400;
            color: #555;
        }

        .back-button {
            display: inline-block;
            margin-top: 2.2rem;
            padding: 0.55rem 1.1rem;
            border: 1px solid #cfcfcf;
            border-radius: 3px;
            background: #f7f7f7;
            color: #444;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
        }

        .back-button:hover {
            background: #eeeeee;
            border-color: #bdbdbd;
        }

        @media (max-width: 768px) {
            .not-found-page {
                padding-top: 18vh;
            }

            .error-code {
                letter-spacing: -5px;
            }
        }
    </style>
</head>
<body>
    <main class="not-found-page">
        <div class="not-found-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Not Found</h2>
            <p class="error-message">The resource requested could not be found on this server!</p>

            <a href="reviews.html" class="back-button">Go Back</a>
        </div>
    </main>
</body>
</html>
